<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a6b2e"/>
  <rect x="40" y="40" width="432" height="432" rx="60" fill="#084d20"/>
  <!-- Wood rail top -->
  <rect x="30" y="30" width="452" height="22" rx="11" fill="#7a3a08"/>
  <rect x="30" y="30" width="452" height="6" rx="3" fill="#a05020"/>
  <!-- Wood rail bottom -->
  <rect x="30" y="460" width="452" height="22" rx="11" fill="#7a3a08"/>
  <rect x="30" y="476" width="452" height="6" rx="3" fill="#a05020"/>
  <!-- Card: Ace of Spades -->
  <rect x="140" y="130" width="100" height="140" rx="12" fill="white"/>
  <text x="155" y="155" font-size="22" font-family="Georgia,serif" fill="#111">A</text>
  <text x="185" y="230" font-size="40" font-family="Georgia,serif" fill="#111" text-anchor="middle">♠</text>
  <text x="225" y="265" font-size="22" font-family="Georgia,serif" fill="#111" transform="rotate(180,225,258)">A</text>
  <!-- Card: King of Hearts -->
  <rect x="272" y="130" width="100" height="140" rx="12" fill="white"/>
  <text x="287" y="155" font-size="22" font-family="Georgia,serif" fill="#c0392b">K</text>
  <text x="322" y="230" font-size="40" font-family="Georgia,serif" fill="#c0392b" text-anchor="middle">♥</text>
  <text x="357" y="265" font-size="22" font-family="Georgia,serif" fill="#c0392b" transform="rotate(180,357,258)">K</text>
  <!-- Label -->
  <text x="256" y="360" text-anchor="middle" font-size="36" font-weight="900" font-family="Georgia,serif" fill="#f0d060" letter-spacing="4">BLACKJACK</text>
  <text x="256" y="390" text-anchor="middle" font-size="16" font-family="Georgia,serif" fill="rgba(255,215,100,0.5)" letter-spacing="6">ROYALE</text>
  <!-- Chips decoration -->
  <circle cx="100" cy="340" r="28" fill="#e74c3c" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <circle cx="100" cy="340" r="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4 4"/>
  <circle cx="412" cy="340" r="28" fill="#f0d060" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <circle cx="412" cy="340" r="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="4 4"/>
</svg>
